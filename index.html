<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiteVuePro</title>
  </head>
  <body>
    <div id="app">
      <!-- 首屏 Loading：在 Vue 挂载前显示，挂载后由根组件替换 -->
      <div class="first-screen-loading" aria-live="polite" aria-busy="true" role="status">
        <div class="first-screen-loading__spinner" aria-hidden="true"></div>
        <span class="first-screen-loading__text">Loading…</span>
      </div>
    </div>
    <style>
      .first-screen-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #333;
      }
      html.dark .first-screen-loading,
      .first-screen-loading.dark { background: #1a1a1a; color: #e5e5e5; }
      .first-screen-loading__spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0,0,0,0.1);
        border-top-color: #646cff;
        border-radius: 50%;
        animation: first-screen-spin 0.8s linear infinite;
      }
      .first-screen-loading__text { margin-top: 12px; font-size: 14px; }
      @keyframes first-screen-spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
